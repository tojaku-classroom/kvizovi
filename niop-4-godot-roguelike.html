// ─── STATE ──────────────────────────────────────────────────────────────────
let activeQuestions = [];
let currentIndex = 0;
let score = 0;
let userAnswers = [];
let timerInterval = null;
let elapsedSeconds = 0;
const QUESTIONS_PER_SESSION = 30;

// ─── TIMER ──────────────────────────────────────────────────────────────────
function startTimer() {
  elapsedSeconds = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    const el = document.getElementById('timer');
    if (el) el.textContent = formatTime(elapsedSeconds);
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }
function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

// ─── SHUFFLE ────────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function prepareQuestion(q) {
  const copy = {
    topic: q.topic,
    question: q.question,
    options: [...q.options],
    correctIndex: q.correctIndex
  };
  const correctAnswer = copy.options[copy.correctIndex];
  const indices = [0, 1, 2, 3];
  shuffle(indices);
  copy.options = indices.map(i => copy.options[i]);
  copy.correctIndex = copy.options.indexOf(correctAnswer);
  return copy;
}

// ─── START ───────────────────────────────────────────────────────────────────
function startQuiz() {
  const pool = shuffle([...allQuestions]);
  activeQuestions = pool.slice(0, QUESTIONS_PER_SESSION).map(prepareQuestion);
  currentIndex = 0;
  score = 0;
  userAnswers = new Array(QUESTIONS_PER_SESSION).fill(null);
  startTimer();
  renderQuestion();
}

// ─── RENDER QUESTION ────────────────────────────────────────────────────────

        <div class="flex items-center gap-3">
          <span class="text-sm text-gray-500">Pitanje <span class="font-bold text-gray-800">${currentIndex + 1}</span> od <span class="font-bold text-gray-800">${QUESTIONS_PER_SESSION}</span></span>
          <span id="timer" class="text-sm font-mono font-bold text-indigo-700 bg-indigo-50 px-2 py-1 rounded">${formatTime(elapsedSeconds)}</span>
        </div>
      </div>

      <div class="w-full bg-gray-200 rounded-full h-1.5 mb-6">
        <div class="bg-indigo-500 h-1.5 rounded-full transition-all duration-300" style="width:${((currentIndex) / QUESTIONS_PER_SESSION) * 100}%"></div>
      </div>

      <p class="text-base font-semibold text-gray-800 mb-6 leading-relaxed">${q.question}</p>

      <div class="space-y-3" id="options">
        ${q.options.map((opt, i) => `
          <button
            onclick="selectOption(${i})"
            id="opt-${i}"
            class="w-full text-left text-sm px-4 py-3 rounded-xl border-2 border-gray-200 text-gray-700 hover:border-indigo-400 hover:bg-indigo-50 transition-all duration-150 ${userAnswers[currentIndex] === i ? 'bg-blue-100 border-blue-500 font-semibold text-blue-800' : ''}"
          >${opt}</button>
        `).join('')}
      </div>

      <div class="mt-6 flex justify-between items-center">
        ${currentIndex > 0 ? `<button onclick="prevQuestion()" class="text-sm text-gray-500 hover:text-indigo-600 font-medium transition-colors">← Natrag</button>` : '<span></span>'}
        <button
          id="next-btn"
          onclick="nextQuestion()"
          ${userAnswers[currentIndex] === null ? 'disabled' : ''}
          class="ml-auto px-6 py-2.5 rounded-xl text-sm font-bold transition-all duration-150 ${userAnswers[currentIndex] === null ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md'}"
        >${currentIndex === QUESTIONS_PER_SESSION - 1 ? 'Završi kviz ✓' : 'Sljedeće →'}</button>
      </div>
    </div>
  `;
}

function selectOption(i) {
  userAnswers[currentIndex] = i;
  renderQuestion();
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() {
  if (userAnswers[currentIndex] === null) return;
  if (currentIndex < QUESTIONS_PER_SESSION - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    stopTimer();
    calcScore();
    renderResults();
  }
}

function calcScore() {
  score = 0;
  activeQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.correctIndex) score++;
  });
}

// ─── RESULTS ────────────────────────────────────────────────────────────────
function renderResults() {
  const pct = Math.round((score / QUESTIONS_PER_SESSION) * 100);
  let msg, msgColor;
  if (pct >= 90)      { msg = "Izvrsno! Pravi Godot stručnjak! 🏆";        msgColor = "text-emerald-700"; }
  else if (pct >= 75) { msg = "Vrlo dobro! Solidno znanje platforme. 🎯";   msgColor = "text-blue-700"; }
  else if (pct >= 55) { msg = "Dobro! Ima još prostora za napredak. 📚";     msgColor = "text-yellow-700"; }
  else                { msg = "Trebalo bi ponoviti gradivo. Probaj opet! 💪"; msgColor = "text-red-700"; }

  document.getElementById('app').innerHTML = `
    <div class="fade-in bg-white rounded-2xl shadow-2xl p-6 md:p-8 text-center">
      <div class="text-5xl mb-4">${pct >= 75 ? '🎮' : '📖'}</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-1">Kviz završen!</h2>
      <p class="text-sm text-gray-500 mb-6">Godot Roguelike – Provjera znanja</p>

      <div class="grid grid-cols-3 gap-4 mb-6">

        <div class="bg-emerald-50 rounded-xl p-4">
          <div class="text-3xl font-bold text-emerald-700">${pct}%</div>
          <div class="text-xs text-gray-500 mt-1">Točnost</div>
        </div>
        <div class="bg-amber-50 rounded-xl p-4">
          <div class="text-3xl font-bold text-amber-700 font-mono">${formatTime(elapsedSeconds)}</div>
          <div class="text-xs text-gray-500 mt-1">Ukupno vrijeme</div>
        </div>
      </div>

      <p class="text-base font-semibold ${msgColor} mb-8">${msg}</p>

      <div class="flex gap-3 justify-center flex-wrap">
        <button onclick="renderReview()" class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 text-sm font-semibold hover:bg-gray-200 transition-colors">📋 Pregled odgovora</button>
        <button onclick="restartQuiz()" class="px-5 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 shadow-md transition-colors">🔄 Novi kviz</button>

    </div>
  `;
}

    const correct = userAnswers[i] === q.correctIndex;
    return `
      <div class="mb-4 p-4 rounded-xl border-2 ${correct ? 'border-emerald-200 bg-emerald-50' : 'border-red-200 bg-red-50'}">
        <div class="flex items-start gap-2 mb-2">
          <span class="mt-0.5 text-base">${correct ? '✅' : '❌'}</span>
          <p class="text-sm font-semibold text-gray-800 leading-snug">${i + 1}. ${q.question}</p>
        </div>
        ${!correct ? `
          <p class="text-xs text-red-700 ml-6 mb-1">Tvoj odgovor: <span class="font-semibold">${q.options[userAnswers[i]] ?? '—'}</span></p>
        ` : ''}
        <p class="text-xs ${correct ? 'text-emerald-700' : 'text-emerald-800 font-semibold'} ml-6">Točan odgovor: <span class="font-semibold">${q.options[q.correctIndex]}</span></p>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="fade-in bg-white rounded-2xl shadow-2xl p-6 md:p-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-gray-800">Pregled odgovora</h2>
        <span class="text-sm font-bold text-indigo-600">${score}/${QUESTIONS_PER_SESSION} točnih</span>
      </div>
      <div class="max-h-[60vh] overflow-y-auto pr-1">${rows}</div>
      <div class="mt-6 flex gap-3 justify-center flex-wrap">
        <button onclick="renderResults()" class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 text-sm font-semibold hover:bg-gray-200 transition-colors">← Rezultati</button>
        <button onclick="restartQuiz()" class="px-5 py-2.5 rounded-xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-700 shadow-md transition-colors">🔄 Novi kviz</button>
      </div>
    </div>
  `;
}

// ─── RESTART ─────────────────────────────────────────────────────────────────
function restartQuiz() { renderWelcome(); }

// ─── WELCOME ────────────────────────────────────────────────────────────────
function renderWelcome() {
  document.getElementById('app').innerHTML = `
    <div class="fade-in bg-white rounded-2xl shadow-2xl p-8 text-center">
      <div class="text-6xl mb-4">🎮</div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Godot Roguelike</h1>
      <h2 class="text-lg font-semibold text-indigo-600 mb-4">Provjera znanja</h2>
      <p class="text-sm text-gray-500 mb-2 leading-relaxed max-w-md mx-auto">
        Kviz ispituje razumijevanje koda roguelike projekta u Godot 4 te opće znanje o Godot platformi.
      </p>
      <div class="flex gap-4 justify-center my-6 flex-wrap text-sm text-gray-600">
        <span class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full font-semibold">📋 30 od 40 pitanja</span>
        <span class="bg-purple-50 text-purple-700 px-3 py-1.5 rounded-full font-semibold">🔀 Nasumičan poredak</span>
        <span class="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full font-semibold">🇭🇷 Hrvatski jezik</span>
      </div>
      <div class="text-xs text-gray-400 mb-8">⅔ pitanja iz repozitorija · ⅓ opća Godot znanja</div>
      <button onclick="startQuiz()" class="px-8 py-3 bg-indigo-600 text-white text-base font-bold rounded-xl hover:bg-indigo-700 shadow-lg transition-all duration-150 hover:scale-105">
        Započni kviz →
      </button>
    </div>
  `;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderWelcome();
</script>
</body>
</html>
